---
name: ci_used_minutes_by_runner_daily
engine: AggregatingMergeTree
engine_full: AggregatingMergeTree ORDER BY (finished_at_bucket, runner_type, status,
  runner_id) SETTINGS index_granularity = 8192
primary_key: finished_at_bucket, runner_type, status, runner_id
sorting_key: finished_at_bucket, runner_type, status, runner_id
settings:
  index_granularity: '8192'
columns:
- name: finished_at_bucket
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
  is_in_sorting_key: true
  is_in_primary_key: true
- name: runner_type
  type: UInt8
  default_kind: DEFAULT
  default_expression: '0'
  is_in_sorting_key: true
  is_in_primary_key: true
- name: status
  type: LowCardinality(String)
  default_kind: DEFAULT
  default_expression: "''"
  is_in_sorting_key: true
  is_in_primary_key: true
- name: runner_id
  type: UInt64
  default_kind: DEFAULT
  default_expression: '0'
  is_in_sorting_key: true
  is_in_primary_key: true
- name: count_builds
  type: AggregateFunction(count)
- name: total_duration
  type: SimpleAggregateFunction(sum, Int64)
- name: project_id
  type: UInt64
  default_kind: DEFAULT
  default_expression: '0'
