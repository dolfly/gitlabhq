---
name: ci_finished_builds_aggregated_queueing_delay_percentiles_by_owner
engine: AggregatingMergeTree
engine_full: AggregatingMergeTree ORDER BY (started_at_bucket, status, runner_type,
  runner_owner_namespace_id) SETTINGS index_granularity = 8192
primary_key: started_at_bucket, status, runner_type, runner_owner_namespace_id
sorting_key: started_at_bucket, status, runner_type, runner_owner_namespace_id
settings:
  index_granularity: '8192'
columns:
- name: started_at_bucket
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
  is_in_sorting_key: true
  is_in_primary_key: true
- name: status
  type: LowCardinality(String)
  default_kind: DEFAULT
  default_expression: "''"
  is_in_sorting_key: true
  is_in_primary_key: true
- name: runner_type
  type: UInt8
  default_kind: DEFAULT
  default_expression: '0'
  is_in_sorting_key: true
  is_in_primary_key: true
- name: runner_owner_namespace_id
  type: UInt64
  default_kind: DEFAULT
  default_expression: '0'
  is_in_sorting_key: true
  is_in_primary_key: true
- name: count_builds
  type: AggregateFunction(count)
- name: queueing_duration_quantile
  type: AggregateFunction(quantile, Int64)
