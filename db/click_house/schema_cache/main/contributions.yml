---
name: contributions
engine: ReplacingMergeTree
engine_full: ReplacingMergeTree PARTITION BY toYear(created_at) ORDER BY (path, created_at,
  author_id, id) SETTINGS index_granularity = 8192
partition_key: toYear(created_at)
primary_key: path, created_at, author_id, id
sorting_key: path, created_at, author_id, id
settings:
  index_granularity: '8192'
columns:
- name: id
  type: UInt64
  default_kind: DEFAULT
  default_expression: '0'
  is_in_sorting_key: true
  is_in_primary_key: true
- name: path
  type: String
  default_kind: DEFAULT
  default_expression: "''"
  is_in_sorting_key: true
  is_in_primary_key: true
- name: author_id
  type: UInt64
  default_kind: DEFAULT
  default_expression: '0'
  is_in_sorting_key: true
  is_in_primary_key: true
- name: target_type
  type: LowCardinality(String)
  default_kind: DEFAULT
  default_expression: "''"
- name: action
  type: UInt8
  default_kind: DEFAULT
  default_expression: '0'
- name: created_at
  type: Date
  default_kind: DEFAULT
  default_expression: toDate(now64())
  is_in_partition_key: true
  is_in_sorting_key: true
  is_in_primary_key: true
- name: updated_at
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
