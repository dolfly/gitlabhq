---
name: namespace_traversal_paths
engine: ReplacingMergeTree
engine_full: ReplacingMergeTree(version, deleted) PRIMARY KEY id ORDER BY id SETTINGS
  index_granularity = 512, deduplicate_merge_projection_mode = 'rebuild'
primary_key: id
sorting_key: id
settings:
  index_granularity: '512'
  deduplicate_merge_projection_mode: "'rebuild'"
columns:
- name: id
  type: Int64
  default_kind: DEFAULT
  default_expression: '0'
  is_in_sorting_key: true
  is_in_primary_key: true
- name: traversal_path
  type: String
  default_kind: DEFAULT
  default_expression: "'0/'"
- name: version
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
- name: deleted
  type: Bool
  default_kind: DEFAULT
  default_expression: 'false'
