---
name: code_suggestion_events
engine: ReplacingMergeTree
engine_full: ReplacingMergeTree PARTITION BY toYear(timestamp) ORDER BY (namespace_path,
  user_id, event, timestamp) SETTINGS index_granularity = 8192
partition_key: toYear(timestamp)
primary_key: namespace_path, user_id, event, timestamp
sorting_key: namespace_path, user_id, event, timestamp
settings:
  index_granularity: '8192'
columns:
- name: user_id
  type: UInt64
  default_kind: DEFAULT
  default_expression: '0'
  is_in_sorting_key: true
  is_in_primary_key: true
- name: event
  type: UInt8
  default_kind: DEFAULT
  default_expression: '0'
  is_in_sorting_key: true
  is_in_primary_key: true
- name: timestamp
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
  is_in_partition_key: true
  is_in_sorting_key: true
  is_in_primary_key: true
- name: namespace_path
  type: String
  default_kind: DEFAULT
  default_expression: "'0/'"
  is_in_sorting_key: true
  is_in_primary_key: true
- name: unique_tracking_id
  type: String
  default_kind: DEFAULT
  default_expression: "''"
- name: language
  type: LowCardinality(String)
  default_kind: DEFAULT
  default_expression: "''"
- name: suggestion_size
  type: UInt64
  default_kind: DEFAULT
  default_expression: '0'
- name: branch_name
  type: String
  default_kind: DEFAULT
  default_expression: "''"
