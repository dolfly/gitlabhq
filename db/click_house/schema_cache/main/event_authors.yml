---
name: event_authors
engine: ReplacingMergeTree
engine_full: ReplacingMergeTree(last_event_at, deleted) PRIMARY KEY author_id ORDER
  BY author_id SETTINGS index_granularity = 8192
primary_key: author_id
sorting_key: author_id
settings:
  index_granularity: '8192'
columns:
- name: author_id
  type: UInt64
  default_kind: DEFAULT
  default_expression: '0'
  is_in_sorting_key: true
  is_in_primary_key: true
- name: deleted
  type: UInt8
  default_kind: DEFAULT
  default_expression: '0'
- name: last_event_at
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
