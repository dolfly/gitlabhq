# @feature_category: pipeline_composition

query getCatalogResourcesCount(
  $searchTerm: String
  $verificationLevel: CiCatalogResourceVerificationLevel
) {
  all: ciCatalogResources(scope: ALL, search: $searchTerm, verificationLevel: $verificationLevel) {
    count
  }
  namespaces: ciCatalogResources(
    scope: NAMESPACES
    search: $searchTerm
    verificationLevel: $verificationLevel
  ) {
    count
  }
  analytics: ciCatalogResources(
    scope: NAMESPACES
    minAccessLevel: MAINTAINER
    search: $searchTerm
    verificationLevel: $verificationLevel
  ) {
    count
  }
}
